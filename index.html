body{background:var(--bg);min-height:100vh;color:var(--text-dark);font-family:"Nunito",sans-serif}
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;background:var(--white)}

.login-sub{font-size:15px;color:var(--text-light);text-align:center;margin-bottom:2.5rem}
.field-label{font-size:11px;font-weight:800;letter-spacing:1.2px;color:var(--teal);text-transform:uppercase;margin-bottom:6px;display:block}

.cal-month{font-size:16px;font-weight:800;color:var(--text-dark);margin-bottom:1rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dn{text-align:center;font-size:9px;font-weight:800;color:var(--text-light);text-transform:uppercase;padding:4px 0}

.turno-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800}

<script>

var AUTH_URL = "https://hook.eu1.make.com/8g42dbwwryob9skne4qwl5mtwv7rg7az";
var DATI_URL = "https://hook.eu1.make.com/y882re16wkatcqdk7zevhr24uknk78v4";
var PRIVACY_URL = "https://hook.eu1.make.com/dmdvislgavso2dhh7ccp5iy4pa69vuox";
var AZIONE_URL = "https://hook.eu1.make.com/6vp67eiqkpd861to9dqqolvfft62ahcq";
var TIMBRA_URL = "https://hook.eu1.make.com/ovyaryk28yqdcl6q2a2v1sasxo5hktj1";
var STRUTTURE_URL = "https://hook.eu1.make.com/xw0j4gjineix3dbogtdayeu0jm4tv6wq";
var TURNI_URL = "https://hook.eu1.make.com/asyef6nu2ll64d3u7ed5qdjpk4w9aneh";
var TIMBRATURE_READ_URL = "https://hook.eu1.make.com/jsjc97nwzuleo7tjo9k37oejuptyhbbh";

var TIMBRATURE_DIP = [];

function fetchTimbrature() {
  fetch(TIMBRATURE_READ_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({nome: S.user.nome})
  })
  .then(function(r){ return r.text(); })
  .then(function(text){
    try {
      var data = JSON.parse(text);
      var raw = Array.isArray(data) ? data : [data];
      TIMBRATURE_DIP = raw.map(function(item) {
        var p = (item && item.properties_value) ? item.properties_value : item;
        // Struttura - testo semplice
        var struttura = "";
        if(typeof p.Struttura === "string") struttura = p.Struttura;
        else if(p.Struttura && Array.isArray(p.Struttura) && p.Struttura[0]) struttura = p.Struttura[0].plain_text || p.Struttura[0].text && p.Struttura[0].text.content || "";
        else if(p.Struttura && p.Struttura.name) struttura = p.Struttura.name;
        // Dipendente
        var dipendente = "";
        if(typeof p.Dipendente === "string") dipendente = p.Dipendente;
        else if(p.Dipendente && Array.isArray(p.Dipendente) && p.Dipendente[0]) dipendente = p.Dipendente[0].plain_text || "";
        // Data
        var data2 = (p.Data && p.Data.start) ? p.Data.start.split("T")[0] : "";
        // Ora entrata
        var oraEntrata = "";
        if(typeof p["Ora entrata"] === "string") oraEntrata = p["Ora entrata"];
        else if(p["Ora entrata"] && Array.isArray(p["Ora entrata"]) && p["Ora entrata"][0]) oraEntrata = p["Ora entrata"][0].plain_text || p["Ora entrata"][0].text && p["Ora entrata"][0].text.content || "";
        // Ora uscita
        var oraUscita = "";
        if(typeof p["Ora uscita"] === "string") oraUscita = p["Ora uscita"];
        else if(p["Ora uscita"] && Array.isArray(p["Ora uscita"]) && p["Ora uscita"][0]) oraUscita = p["Ora uscita"][0].plain_text || p["Ora uscita"][0].text && p["Ora uscita"][0].text.content || "";
        // Ore totali
        var oreTotali = p["Ore totali"] || 0;
        // Stato
        var stato = (p.Stato && p.Stato.name) ? p.Stato.name : "";
        return {struttura:struttura, dipendente:dipendente, data:data2, oraEntrata:oraEntrata, oraUscita:oraUscita, oreTotali:parseFloat(oreTotali)||0, stato:stato};
      }).filter(function(t){ return t.data; });
      render();
    } catch(e) {
      console.log("Errore fetch timbrature:", e);
    }
  })
  .catch(function(e){ console.log("Errore fetch timbrature:", e); });
}

function calcOreSettimana() {
  var oggi = new Date();
  var lunedi = new Date(oggi);
  lunedi.setDate(oggi.getDate() - (oggi.getDay()===0 ? 6 : oggi.getDay()-1));
  var lunediStr = lunedi.toISOString().split("T")[0];
  var domenicaStr = oggi.toISOString().split("T")[0];
  return TIMBRATURE_DIP.filter(function(t){
    return t.data >= lunediStr && t.data <= domenicaStr;
  }).reduce(function(acc, t){ return acc + t.oreTotali; }, 0);
}

function calcOreMese() {
  var oggi = new Date();
  var meseStr = oggi.getFullYear() + "-" + String(oggi.getMonth()+1).padStart(2,"0");
  return TIMBRATURE_DIP.filter(function(t){
    return t.data && t.data.startsWith(meseStr);
  }).reduce(function(acc, t){ return acc + t.oreTotali; }, 0);
}

function calcOrePrevisteMese() {
  var oggi = new Date();
  var meseStr = oggi.getFullYear() + "-" + String(oggi.getMonth()+1).padStart(2,"0");
  return TURNI_DIP.filter(function(t){
    return t.data && t.data.startsWith(meseStr);
  }).reduce(function(acc, t){
    if(!t.oraInizio || !t.oraFine) return acc;
    var ini = t.oraInizio.split(":"); var fin = t.oraFine.split(":");
    var ore = (parseInt(fin[0])*60 + parseInt(fin[1]) - parseInt(ini[0])*60 - parseInt(ini[1])) / 60;
    return acc + (ore > 0 ? ore : 0);
  }, 0);
}

var LOGO_IMG = "<img src='https://raw.githubusercontent.com/gbarborio-hub/senca-hub/main/www_senca_it.svg' style='width:100%;height:100%;object-fit:contain'/>";

var POSTS = [];
var INCARICATI = [];
var TURNI_DIP = [];

function fetchTurni() {
  fetch(TURNI_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({nome: S.user.nome})
  })
  .then(function(r){ return r.text(); })
  .then(function(text){
    try {
      var data = JSON.parse(text);
      var raw = Array.isArray(data) ? data : [data];
      TURNI_DIP = raw.map(function(item) {
        var p = (item && item.properties_value) ? item.properties_value : item;
        var titolo = "";
        if(p.Titolo && Array.isArray(p.Titolo) && p.Titolo[0]) titolo = p.Titolo[0].plain_text || "";
        var dipendente = typeof p.Dipendente === "string" ? p.Dipendente : (p.Dipendente && p.Dipendente[0] ? p.Dipendente[0].plain_text || "" : "");
        var struttura = (p.Struttura && p.Struttura.name) ? p.Struttura.name : (typeof p.Struttura === "string" ? p.Struttura : "");
        var tipo = (p["Tipo turno"] && p["Tipo turno"].name) ? p["Tipo turno"].name : "";
        var data2 = (p.Data && p.Data.start) ? p.Data.start.split("T")[0] : "";
        var oraInizio = typeof p["Ora inizio"] === "string" ? p["Ora inizio"] : (p["Ora inizio"] && p["Ora inizio"][0] ? p["Ora inizio"][0].plain_text || "" : "");
        var oraFine = typeof p["Ora fine"] === "string" ? p["Ora fine"] : (p["Ora fine"] && p["Ora fine"][0] ? p["Ora fine"][0].plain_text || "" : "");
        return {titolo:titolo, dipendente:dipendente, struttura:struttura, tipo:tipo, data:data2, oraInizio:oraInizio, oraFine:oraFine};
      }).filter(function(t){ return t.data; })
        .sort(function(a,b){ return a.data > b.data ? 1 : -1; });
      S.loadingTurni = false;
      render();
    } catch(e) {
      console.log("Errore fetch turni:", e);
      S.loadingTurni = false;
      render();
    }
  })
  .catch(function(e){
    console.log("Errore fetch turni:", e);
    S.loadingTurni = false;
    render();
  });
}

// Strutture — caricate da Notion
var STRUTTURE = [];

function fetchStrutture() {
  fetch(STRUTTURE_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({action:"get_strutture"})
  })
  .then(function(r){ return r.text(); })
  .then(function(text){
    try {
      var data = JSON.parse(text);
      var raw = Array.isArray(data) ? data : [data];
      STRUTTURE = raw.map(function(item) {
        var p = (item && item.properties_value) ? item.properties_value : item;
        var nome = "";
        if(p["Nome struttura"] && Array.isArray(p["Nome struttura"]) && p["Nome struttura"][0]) {
          nome = p["Nome struttura"][0].plain_text || p["Nome struttura"][0].text && p["Nome struttura"][0].text.content || "";
        } else if(typeof p["Nome struttura"] === "string") {
          nome = p["Nome struttura"];
        }
        var lat = p.Latitudine || 0;
        var lng = p.Longitudine || 0;
        var raggio = p["Raggio GPS (metri)"] || 200;
        var id = item["Page ID"] || item.id || nome;
        return {id:id, nome:nome, lat:lat, lng:lng, raggio:raggio};
      }).filter(function(s){ return s.nome; });
      render();
    } catch(e) {
      console.log("Errore fetch strutture:", e);
    }
  })
  .catch(function(e){ console.log("Errore fetch strutture:", e); });
}

function fmtDate(d) {
  if(!d) return "";
  var p = d.split("-");
  return p[2]+"/"+p[1];
}
function fmtDateIt(d) {
  if(!d) return "—";
  var p = d.split("-");
  if(p.length < 3) return d;
  return p[2]+"/"+p[1]+"/"+p[0];
}
function nominaColor(stato) {
  if(stato==="Firmata") return "#1A6B3A";
  if(stato==="Inviata") return "#1A4A7A";
  if(stato==="Sollecito") return "#7A1A1A";
  return "#5A5A5A";
}
function nominaBg(stato) {
  if(stato==="Firmata") return "#D5F0E0";
  if(stato==="Inviata") return "#E0F0FF";
  if(stato==="Sollecito") return "#FCE4E4";
  return "#EEEEEE";
}
function distanzaMetri(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2-lat1)*Math.PI/180;
  var dLng = (lng2-lng1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function doLogin() {
  var uname = document.getElementById("inp-user").value.trim().toLowerCase();
  var pwd = document.getElementById("inp-pass").value.trim();
  if(!uname || !pwd) return;
  var btn = document.getElementById("login-btn");
  var err = document.getElementById("login-err");
  btn.disabled = true;
  btn.innerHTML = "<span class=\"spinner\"></span>Accesso...";
  err.style.display = "none";
  fetch(AUTH_URL, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:uname,password:pwd})})
  .then(function(r){ if(!r.ok) throw new Error("network"); return r.json(); })
  .then(function(res) {
    if(res && res.ok === true && res.nome) {
      S.loggedIn = true;
      S.user = {nome:res.nome, ruolo:res.ruolo||"Utente", username:uname};
      if(isAdmin()) { fetchPosts(); fetchIncaricati(); }
      if(isDipendente()) { fetchStrutture(); fetchTurni(); fetchTimbrature(); }
      render();
    } else {
      err.textContent = "Credenziali non valide. Riprova.";
      err.style.display = "block";
      btn.disabled = false;
      btn.innerHTML = "Accedi";
    }
  })
  .catch(function() {
    err.textContent = "Errore di connessione. Riprova.";
    err.style.display = "block";
    btn.disabled = false;
    btn.innerHTML = "Accedi";
  });
}

function doTimbraEntrata() {
  var strutId = S.timbraStruttura;
  if(!strutId) {
    S.timbraMsg = "⚠️ Seleziona una struttura prima di timbrare.";
    S.timbraMsgType = "warn";
    render();
    return;
  }
  var strut = STRUTTURE.find(function(s){ return s.id === strutId; });
  if(!strut) return;

  // Controllo turno del giorno
  var now = new Date();
  var oggi = now.toISOString().split("T")[0];
  var turniOggi = TURNI_DIP.filter(function(t){ return t.data === oggi; });

  if(turniOggi.length === 0) {
    S.timbraMsg = "❌ Nessun turno previsto oggi. Timbratura non autorizzata.";
    S.timbraMsgType = "err";
    render();
    return;
  }

  // Controlla se l'orario attuale è entro 30 min dall'inizio di un turno
  var minutiAttuali = now.getHours() * 60 + now.getMinutes();
  var turnoValido = null;
  for(var i=0; i<turniOggi.length; i++) {
    var t = turniOggi[i];
    if(!t.oraInizio) continue;
    var parti = t.oraInizio.split(":");
    var minutiInizio = parseInt(parti[0]) * 60 + parseInt(parti[1]);
    var diff = minutiAttuali - minutiInizio;
    if(diff >= -30 && diff <= 30) {
      turnoValido = t;
      break;
    }
  }

  if(!turnoValido) {
    var turnoOggi = turniOggi[0];
    S.timbraMsg = "❌ Fuori orario. Il tuo turno inizia alle " + turnoOggi.oraInizio + ". Puoi timbrare max 30 minuti prima o dopo.";
    S.timbraMsgType = "err";
    render();
    return;
  }

  if(!navigator.geolocation) {
    S.timbraMsg = "❌ Il GPS non è disponibile su questo dispositivo.";
    S.timbraMsgType = "err";
    render();
    return;
  }

  S.timbraMsg = "📡 Rilevamento posizione GPS...";
  S.timbraMsgType = "warn";
  render();

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var dist = distanzaMetri(pos.coords.latitude, pos.coords.longitude, strut.lat, strut.lng);
      if(dist > strut.raggio) {
        S.timbraMsg = "❌ GPS non autorizzato. Sei a " + Math.round(dist) + "m dalla struttura (max " + strut.raggio + "m).";
        S.timbraMsgType = "err";
        render();
        return;
      }
      var now = new Date();
      var ora = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
      S.timbratoEntrata = ora;
      S.timbraEntrataFull = now.toISOString();
      S.timbraLat = pos.coords.latitude;
      S.timbraLng = pos.coords.longitude;
      S.timbraStrutturaNome = strut.nome;
      S.timbraTurno = turnoValido;
      S.timbraMsg = "✅ Entrata registrata alle " + ora + " — sei a " + Math.round(dist) + "m dalla struttura.";
      S.timbraMsgType = "ok";
      render();
    },
    function() {
      S.timbraMsg = "❌ Impossibile rilevare la posizione GPS. Controlla i permessi.";
      S.timbraMsgType = "err";
      render();
    },
    {enableHighAccuracy:true, timeout:10000}
  );
}

function doTimbraUscita() {
  if(!S.timbratoEntrata) return;
  var strut = STRUTTURE.find(function(s){ return s.id === S.timbraStruttura; });
  if(!strut) return;

  S.timbraMsg = "📡 Rilevamento posizione GPS...";
  S.timbraMsgType = "warn";
  render();

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var dist = distanzaMetri(pos.coords.latitude, pos.coords.longitude, strut.lat, strut.lng);
      if(dist > strut.raggio) {
        S.timbraMsg = "❌ GPS non autorizzato per l'uscita. Sei a " + Math.round(dist) + "m.";
        S.timbraMsgType = "err";
        render();
        return;
      }
      var now = new Date();
      var ora = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
      var entrata = new Date(S.timbraEntrataFull);
      var oreTotali = Math.round((now - entrata) / 36000) / 100;
      var oggi = now.toISOString().split("T")[0];

      // Invia a Make → Notion
      S.timbraMsg = "⏳ Salvataggio in corso...";
      S.timbraMsgType = "warn";
      render();

      fetch(TIMBRA_URL, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          nome: S.user.nome,
          username: S.user.username || "",
          struttura: S.timbraStrutturaNome || strut.nome,
          data: oggi,
          oraEntrata: S.timbratoEntrata,
          oraUscita: ora,
          oreTotali: oreTotali,
          stato: "Regolare",
          turno: S.timbraTurno ? S.timbraTurno.tipo : "",
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        })
      })
      .then(function(r){ return r.json(); })
      .then(function() {

// ===== POSTS =====
function parsePost(item) {
  var p=item.properties_value||item;
  var titolo="";if(p.Titolo&&p.Titolo[0])titolo=p.Titolo[0].plain_text||"";
  var stato="Bozza";if(p.Stato&&p.Stato.name)stato=p.Stato.name;
  var data="";if(p["Publish date"]&&p["Publish date"].start)data=p["Publish date"].start.split("T")[0].split(" ")[0];
  var canali=[];if(p.Canali&&Array.isArray(p.Canali))canali=p.Canali.map(function(c){return c.name||"";}).filter(Boolean);
  return {titolo:titolo,stato:stato,canali:canali,data:data};
}
function fetchPosts() {
  S.posts=[];S.loading=true;render();
  fetch(DATI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"get_posts"})})
  .then(function(r){return r.text();})
  .then(function(text){
    try{var data=JSON.parse(text);var raw=Array.isArray(data)?data:[data];S.posts=raw.map(parsePost).filter(function(p){return p.titolo;});}catch(e){S.posts=[];}
    S.loading=false;render();
  })
  .catch(function(){S.loading=false;render();});
}

// ===== INCARICATI =====
function fetchIncaricati() {
  S.loadingPrivacy=true;render();
  fetch(PRIVACY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"get_incaricati"})})
  .then(function(r){return r.text();})
  .then(function(text){
    try{var data=JSON.parse(text);var raw=Array.isArray(data)?data:[data];INCARICATI=raw.map(parseIncaricato).filter(function(p){return p.nome||p.cognome;});}catch(e){INCARICATI=[];}
    S.loadingPrivacy=false;render();
  })
  .catch(function(){S.loadingPrivacy=false;render();});
}
function parseIncaricato(item) {
  var p=(item&&item.properties_value)?item.properties_value:item;
  var nome="";if(p.Nome&&Array.isArray(p.Nome)&&p.Nome.length>0){var n0=p.Nome[0];if(n0&&n0.text&&n0.text.content)nome=n0.text.content;else if(n0&&n0.plain_text)nome=n0.plain_text;}
  var cognome="";if(p.Cognome&&Array.isArray(p.Cognome)&&p.Cognome.length>0){var c0=p.Cognome[0];if(c0&&c0.text&&c0.text.content)cognome=c0.text.content;else if(c0&&c0.plain_text)cognome=c0.plain_text;}
  var email=p.Email||"";
  var mansione=(p.Mansione&&p.Mansione.name)?p.Mansione.name:(typeof p.Mansione==="string"?p.Mansione:"");
  var contratto=(p["Tipo di contratto"]&&p["Tipo di contratto"].name)?p["Tipo di contratto"].name:(typeof p["Tipo di contratto"]==="string"?p["Tipo di contratto"]:"");
  var nomina=(p.Nomina&&p.Nomina.name)?p.Nomina.name:(typeof p.Nomina==="string"?p.Nomina:"Non inviata");
  var dataInvio=(p["Data invio"]&&p["Data invio"].start)?p["Data invio"].start:"";
  var dataFirma=(p["Data firma"]&&p["Data firma"].start)?p["Data firma"].start:"";
  var pv=item.properties_value||{};
  var pageId=item.id||item["Page ID"]||pv.id||"";
  if(!pageId&&pv.url)pageId=pv.url.replace("https://www.notion.so/","").replace(/-/g,"");
  return {nome:nome,cognome:cognome,email:email,mansione:mansione,contratto:contratto,nomina:nomina,dataInvio:dataInvio,dataFirma:dataFirma,pageId:pageId};
}
function azioneNomina(pageId,email,nome,cognome,stato) {
  var oggi=new Date().toISOString().split("T")[0];
  fetch(AZIONE_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pageId:pageId,email:email,nome:nome,cognome:cognome,stato:stato,dataInvio:oggi,subject:"Nomina a Incaricato del Trattamento Dati - Senca Senior Care",body:"Gentile "+nome+" "+cognome+",<br><br>Le inviamo la nomina a incaricato del trattamento dei dati personali.<br><br>La preghiamo di firmare e restituire il documento allegato.<br><br>Cordiali saluti,<br>Senca Senior Care"})})
  .then(function(){fetchIncaricati();})
  .catch(function(){alert("Errore nell'invio. Riprova.");});
}

      else{m+="<button onclick=\"azioneNomina('"+inc.pageId+"','"+inc.email+"','"+inc.nome+"','"+inc.cognome+"','Sollecito')\" style=\"padding:0.9rem;background:var(--coral);border-radius:30px;border:none;font-size:15px;font-weight:800;color:white;cursor:pointer;font-family:'Nunito',sans-serif\">🔔 Sollecita</button>";}
    }
    m+="<button onclick=\"S.privacyDetail=null;render()\" style=\"padding:0.9rem;background:var(--coral);border-radius:30px;border:none;font-size:15px;font-weight:800;color:white;cursor:pointer;font-family:'Nunito',sans-serif\">← Indietro</button>";
    m+="</div>";
    return m;
  }
  if(S.loadingPrivacy){return "<div style=\"display:flex;align-items:center;justify-content:center;height:50vh;flex-direction:column;gap:1rem\"><div class=\"spinner\" style=\"width:32px;height:32px;border-width:3px\"></div><div style=\"color:#7A9999;font-weight:700;font-size:14px\">Caricamento incaricati...</div></div>";}
  var m="";
  m+="<div style=\"background:var(--coral);border-radius:30px;padding:0.75rem;text-align:center;font-size:16px;font-weight:800;color:white;margin-bottom:1.25rem\">Privacy</div>";
  m+="<div class=\"half-cards\">";
  m+="<div class=\"half-card dark\" style=\"cursor:pointer\" onclick=\"S.privacySection='incaricati';render()\"><div class=\"half-card-orb\"></div><div style=\"font-size:15px;font-weight:900;color:white\">Incaricati</div><div style=\"font-size:11px;color:rgba(255,255,255,0.7)\">al trattamento</div></div>";
  m+="<div class=\"half-card\" style=\"background:var(--teal);cursor:pointer\"><div class=\"half-card-orb\"></div><div style=\"font-size:15px;font-weight:900;color:white\">Responsabili</div><div style=\"font-size:11px;color:rgba(255,255,255,0.7)\">al trattamento</div></div>";
  m+="</div>";
  m+="<div style=\"background:var(--cyan);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:0.75rem;cursor:pointer\"><div style=\"font-size:20px;font-weight:900;color:white\">Status dei lavori</div></div>";
  m+="<div class=\"half-cards\">";
  m+="<div class=\"half-card\" style=\"background:var(--coral);cursor:pointer\"><div class=\"half-card-orb\"></div><div style=\"font-size:14px;font-weight:900;color:white\">Amministratori</div><div style=\"font-size:11px;color:rgba(255,255,255,0.7)\">di sistema</div></div>";
  m+="<div class=\"half-card dark\" style=\"cursor:pointer\"><div class=\"half-card-orb\"></div><div style=\"font-size:14px;font-weight:900;color:white\">Pazienti</div><div style=\"font-size:11px;color:rgba(255,255,255,0.7)\">e utenti</div></div>";
  m+="</div>";
  if(S.privacySection==="incaricati"){
    m+="<div style=\"font-size:16px;font-weight:800;color:var(--text-dark);margin:1rem 0 0.75rem\">Incaricati al trattamento</div>";
    m+="<div class=\"table-card\">";
    if(INCARICATI.length===0){m+="<div style=\"padding:2rem;text-align:center;color:#7A9999;font-weight:700\">Nessun incaricato trovato</div>";}
    else{for(var i=0;i<INCARICATI.length;i++){var inc=INCARICATI[i];if(!inc.nome)continue;m+="<div class=\"table-row\" style=\"cursor:pointer\" onclick=\"S.privacyDetail=INCARICATI["+i+"];render()\"><div style=\"flex:1;min-width:0\"><div class=\"row-title\">"+inc.nome+" "+inc.cognome+"</div><div style=\"font-size:11px;color:var(--text-light);font-weight:600\">"+(inc.mansione||"")+"</div></div><div style=\"padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800;background:"+nominaBg(inc.nomina)+";color:"+nominaColor(inc.nomina)+";white-space:nowrap;flex-shrink:0\">"+(inc.nomina||"Non inviata")+"</div></div>";}}
    m+="</div><button class=\"update-btn\" onclick=\"fetchIncaricati()\">Aggiorna</button>";
  }
  return m;
}

render();
</script>
</body>
</html>
