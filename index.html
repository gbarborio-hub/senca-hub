body{background:var(--bg);min-height:100vh;color:var(--text-dark);font-family:"Nunito",sans-serif}
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;background:var(--white)}
.login-logo-area{width:100%;display:flex;align-items:center;justify-content:center;padding:3rem 2rem 1.5rem}
.login-logo-wrap{width:160px;height:160px}
.login-body{width:100%;max-width:420px;padding:1.5rem 2rem 3rem}
.login-greeting{font-size:28px;font-weight:800;color:var(--text-dark);text-align:center;margin-bottom:0.5rem}
.login-sub{font-size:15px;color:var(--text-light);text-align:center;margin-bottom:2.5rem}
.field-label{font-size:11px;font-weight:800;letter-spacing:1.2px;color:var(--teal);text-transform:uppercase;margin-bottom:6px;display:block}
.field-input{width:100%;background:transparent;border:none;border-bottom:1.5px solid var(--teal);padding:8px 0 6px;font-size:15px;font-family:"Nunito",sans-serif;color:var(--text-dark);outline:none;margin-bottom:1.5rem}
.field-input::placeholder{color:var(--text-light)}
.login-btn{width:100%;padding:1rem;border:1.5px solid var(--text-mid);border-radius:30px;background:transparent;font-size:16px;font-weight:700;color:var(--text-dark);cursor:pointer;font-family:"Nunito",sans-serif;margin-top:0.5rem;transition:all 0.15s}
.login-btn:hover{background:var(--teal);color:white;border-color:var(--teal)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed}
.login-error{font-size:13px;color:#C0392B;text-align:center;margin-top:0.75rem;display:none;padding:0.75rem;background:#FCE4E4;border-radius:8px}
.app-screen{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;max-width:420px;margin:0 auto}
.app-header{padding:1.25rem 1.5rem 0.5rem;display:flex;align-items:center;justify-content:space-between}
.app-greeting{font-size:22px;font-weight:800;color:var(--teal-dark);line-height:1.2}
.app-logo{width:42px;height:42px;flex-shrink:0}
.app-content{flex:1;padding:0.75rem 1rem 2rem;overflow-y:auto}
.nav-tabs{display:flex;gap:0.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.nav-tab{padding:0.45rem 1.1rem;border-radius:20px;font-size:13.5px;font-weight:700;cursor:pointer;border:none;font-family:"Nunito",sans-serif;transition:all 0.15s}
.nav-tab.active{background:var(--coral);color:white}
.nav-tab.inactive{background:var(--white);color:var(--text-mid)}
.section-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem}
.section-title{font-size:16px;font-weight:800;color:var(--text-dark)}
.stat-card{background:var(--teal-dark);border-radius:var(--radius);padding:1.5rem 1.5rem 1.75rem;margin-bottom:0.75rem;position:relative;overflow:hidden}
.stat-card-orb{position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);pointer-events:none}
.stat-label{font-size:13px;color:rgba(255,255,255,0.7);font-weight:600;margin-bottom:0.5rem}
.stat-number{font-size:52px;font-weight:900;color:white;line-height:1;margin-bottom:0.25rem}
.stat-sub{font-size:13px;color:rgba(255,255,255,0.7);font-weight:600}
.half-cards{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem}
.half-card{border-radius:var(--radius);padding:1.25rem 1rem 1.5rem;position:relative;overflow:hidden;min-height:90px}
.half-card.cyan{background:var(--cyan)}
.half-card.dark{background:var(--teal-dark)}
.half-card-orb{position:absolute;right:-15px;bottom:-15px;width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.2),transparent);pointer-events:none}
.half-card-label{font-size:12px;color:rgba(255,255,255,0.8);font-weight:700;margin-bottom:0.25rem}
.half-card-number{font-size:30px;font-weight:900;color:white}
.half-card-unit{font-size:11px;color:rgba(255,255,255,0.7);font-weight:600;margin-top:2px}
.piano-chips{display:flex;gap:0.6rem;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.piano-chips::-webkit-scrollbar{display:none}
.piano-chip{flex-shrink:0;padding:0.9rem 1.1rem;border-radius:var(--radius-sm);font-size:13px;font-weight:800;cursor:pointer;min-width:100px;text-align:center}
.chip-count{font-size:22px;font-weight:900;display:block;margin-bottom:2px}
.update-btn{width:100%;padding:1rem;background:var(--cyan);border-radius:30px;border:none;font-size:16px;font-weight:800;color:white;cursor:pointer;font-family:"Nunito",sans-serif;margin-top:0.75rem}
.table-card{background:white;border-radius:var(--radius);overflow:hidden;margin-bottom:0.75rem}
.table-row{display:flex;align-items:center;padding:0.85rem 1rem;border-bottom:1px solid var(--bg);gap:6px}
.table-row:last-child{border-bottom:none}
.row-title{font-size:13px;font-weight:700;color:var(--text-dark);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-date{font-size:11px;color:var(--text-light);font-weight:600;white-space:nowrap;flex-shrink:0}
.row-channels{display:flex;gap:3px;flex-shrink:0}
.ch{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0}
.ch-ig{background:#E1306C;color:white}
.ch-fb{background:#1877F2;color:white}
.ch-li{background:#0A66C2;color:white}
.badge{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:800;white-space:nowrap;flex-shrink:0}
.badge-pub{background:#D5F0E0;color:#1A6B3A}
.badge-appr{background:#FEF3CD;color:#7A5800}
.badge-bozza{background:#E0F0FF;color:#1A4A7A}
.badge-rev{background:#FCE4E4;color:#7A1A1A}
.filters{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.75rem}
.filt{padding:0.35rem 0.8rem;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:"Nunito",sans-serif}
.filt.active{background:var(--teal);color:white}
.filt.inactive{background:white;color:var(--text-mid)}
.bottom-nav{background:white;display:flex;justify-content:space-around;padding:0.75rem 0 1rem;border-top:1px solid #E0ECEC;position:sticky;bottom:0}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:0 1rem}
.bnav-icon{width:22px;height:22px;opacity:0.35}
.bnav-icon svg{width:22px;height:22px;stroke:var(--text-dark);fill:none;stroke-width:2}
.bnav-label{font-size:10px;font-weight:700;color:var(--text-light)}
.bnav-item.active .bnav-icon{opacity:1}
.bnav-item.active .bnav-icon svg{stroke:var(--teal)}
.bnav-item.active .bnav-label{color:var(--teal)}
.cal-wrap{background:white;border-radius:var(--radius);padding:1rem;margin-bottom:0.75rem}
.cal-month{font-size:16px;font-weight:800;color:var(--text-dark);margin-bottom:1rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dn{text-align:center;font-size:9px;font-weight:800;color:var(--text-light);text-transform:uppercase;padding:4px 0}
.cal-day{border-radius:6px;padding:3px 2px;min-height:48px}
.cal-day.other{opacity:0.3}
.cal-day.today{background:var(--cyan-light)}
.cal-num{font-weight:700;color:var(--text-mid);font-size:10px;padding:1px 3px;margin-bottom:2px}
.cal-ev{font-size:8px;padding:1px 3px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;background:var(--cyan-light);color:var(--teal-dark)}
.cal-ev.pub{background:#D5F0E0;color:#1A6B3A}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

function chHtml(c) {
  if(c==="Instagram") return "<div class=\"ch ch-ig\">IG</div>";
  if(c==="Facebook") return "<div class=\"ch ch-fb\">FB</div>";
  if(c==="LinkedIn") return "<div class=\"ch ch-li\">LI</div>";
  return "";
}

function badgeClass(s) {
  if(s==="Pubblicato") return "badge badge-pub";
  if(s==="Approvato") return "badge badge-appr";
  if(s==="Bozza") return "badge badge-bozza";
  return "badge badge-rev";
}

function fmtDate(d) {
  if(!d) return "";
  var p = d.split("-");
  return p[2]+"/"+p[1];
}

function doLogin() {
  var uname = document.getElementById("inp-user").value.trim();
  var pwd = document.getElementById("inp-pass").value.trim();
  if(!uname || !pwd) return;
  var btn = document.getElementById("login-btn");
  var err = document.getElementById("login-err");
  btn.disabled = true;
  btn.innerHTML = "<span class=\"spinner\"></span>Accesso...";
  err.style.display = "none";
  fetch(AUTH_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({username:uname, password:pwd})
  })
  .then(function(r){ return r.json(); })
  .then(function(res) {
    if(res.ok) {
      S.loggedIn = true;
      S.user = {nome: res.nome, ruolo: res.ruolo};
      S.posts = POSTS;
      render();
    } else {
      err.style.display = "block";
      btn.disabled = false;
      btn.innerHTML = "Accedi";
    }
  })
  .catch(function() {
    err.style.display = "block";
    btn.disabled = false;
    btn.innerHTML = "Accedi";
  });
}

function doLogout() { S.loggedIn=false; S.user=null; render(); }
function setView(v) { S.view=v; render(); }
function setFilter(f) { S.filter=f; render(); }
function setFC(c) { S.filterCanale=c; render(); }

  h += "<div class=\"login-sub\">Accedi alla tua dashboard</div>";
  h += "<label class=\"field-label\">Username</label>";
  h += "<input class=\"field-input\" id=\"inp-user\" type=\"text\" placeholder=\"es. giovanni\" autocapitalize=\"none\"/>";
  h += "<label class=\"field-label\">Password</label>";
  h += "<input class=\"field-input\" id=\"inp-pass\" type=\"password\" placeholder=\"La tua password\"/>";
  h += "<button class=\"login-btn\" id=\"login-btn\" onclick=\"doLogin()\">Accedi</button>";
  h += "<div class=\"login-error\" id=\"login-err\">Credenziali non valide. Riprova.</div>";
  h += "</div></div>";
  document.getElementById("root").innerHTML = h;
  document.getElementById("inp-pass").addEventListener("keydown", function(e){ if(e.key==="Enter") doLogin(); });
}

function renderApp() {
  var u = S.user;
  var p = S.posts;
  var pub = 0; var appr = 0; var bozza = 0; var rev = 0;
  for(var i=0;i<p.length;i++) {
    if(p[i].stato==="Pubblicato") pub++;
    else if(p[i].stato==="Approvato") appr++;
    else if(p[i].stato==="Bozza") bozza++;
    else rev++;
  }
  var total = p.length;
  var perc = total>0 ? Math.round(pub/total*100) : 0;
  var m = "";

  if(S.view==="dashboard") {
    m += "<div class=\"nav-tabs\">";
    m += "<div class=\"nav-tab inactive\" onclick=\"S.tab=1;render()\">All</div>";
    m += "<div class=\"nav-tab active\">Marketing</div>";
    m += "<div class=\"nav-tab inactive\">Privacy</div>";
    m += "</div>";
    m += "<div class=\"section-label\"><div class=\"section-title\">Status Marketing</div></div>";
    m += "<div class=\"stat-card\"><div class=\"stat-card-orb\"></div>";
    m += "<div class=\"stat-label\">Post totali</div>";
    m += "<div class=\"stat-number\">" + total + "</div>";
    m += "<div class=\"stat-sub\">piano editoriale maggio</div></div>";
    m += "<div class=\"half-cards\">";
    m += "<div class=\"half-card cyan\"><div class=\"half-card-orb\"></div><div class=\"half-card-label\">Pubblicati</div><div class=\"half-card-number\">" + perc + "%</div><div class=\"half-card-unit\">" + pub + " su " + total + "</div></div>";
    m += "<div class=\"half-card dark\"><div class=\"half-card-orb\"></div><div class=\"half-card-label\">In lavorazione</div><div class=\"half-card-number\">" + appr + "</div><div class=\"half-card-unit\">approvati</div></div>";
    m += "</div>";
    m += "<div class=\"section-label\" style=\"margin-top:1rem\"><div class=\"section-title\">Piano editoriale</div></div>";
    m += "<div class=\"piano-chips\">";
    m += "<div class=\"piano-chip\" style=\"background:#E8603A;color:white\" onclick=\"setView('lista');setFilter('Approvato')\"><span class=\"chip-count\">" + appr + "</span>Approvati</div>";
    m += "<div class=\"piano-chip\" style=\"background:#EF8060;color:white\" onclick=\"setView('lista');setFilter('Revisione')\"><span class=\"chip-count\">" + rev + "</span>Revisione</div>";
    m += "<div class=\"piano-chip\" style=\"background:#F4A080;color:white\" onclick=\"setView('lista');setFilter('Pubblicato')\"><span class=\"chip-count\">" + pub + "</span>Pubblicati</div>";
    m += "<div class=\"piano-chip\" style=\"background:#C0A060;color:white\" onclick=\"setView('lista');setFilter('Bozza')\"><span class=\"chip-count\">" + bozza + "</span>Bozza</div>";
    m += "</div>";
    m += "<button class=\"update-btn\" onclick=\"render()\">Aggiornamenti</button>";
  }
  else if(S.view==="lista") {
    var posts = [];
    for(var j=0;j<p.length;j++) {
      if(S.filter!=="Tutti" && p[j].stato!==S.filter) continue;
      if(S.filterCanale!=="Tutti" && p[j].canali.indexOf(S.filterCanale)<0) continue;
      posts.push(p[j]);
    }
    m += "<div class=\"filters\">";
    var stati = ["Tutti","Pubblicato","Approvato","Bozza","Revisione"];
    for(var k=0;k<stati.length;k++) {
      var cls = S.filter===stati[k] ? "active" : "inactive";
      m += "<div class=\"filt " + cls + "\" onclick=\"setFilter('" + stati[k] + "')\">"+stati[k]+"</div>";
    }
    m += "</div><div class=\"filters\">";
    var can = ["Tutti","Instagram","Facebook","LinkedIn"];
    for(var l=0;l<can.length;l++) {
      var cls2 = S.filterCanale===can[l] ? "active" : "inactive";
      m += "<div class=\"filt " + cls2 + "\" onclick=\"setFC('" + can[l] + "')\">"+can[l]+"</div>";
    }
    m += "</div><div class=\"table-card\">";
    if(posts.length===0) {
      m += "<div style=\"padding:2rem;text-align:center;color:#7A9999;font-weight:700\">Nessun post trovato</div>";
    } else {
      for(var n=0;n<posts.length;n++) {
        var x = posts[n];
        m += "<div class=\"table-row\">";
        m += "<div class=\"row-title\">" + x.titolo + "</div>";
        m += "<div class=\"row-date\">" + fmtDate(x.data) + "</div>";
        m += "<div class=\"row-channels\">";
        for(var q=0;q<x.canali.length;q++) m += chHtml(x.canali[q]);
        m += "</div>";
        m += "<div class=\"" + badgeClass(x.stato) + "\">" + x.stato + "</div>";
        m += "</div>";
      }
    }
    m += "</div>";
  }
  else if(S.view==="calendario") {
    var byDate = {};
    for(var bi=0;bi<p.length;bi++) {
      var dd = p[bi].data.split("-")[2];
      if(!byDate[dd]) byDate[dd]=[];
      byDate[dd].push(p[bi]);
    }
    var firstDay = new Date(2026,4,1).getDay();
    var daysInMonth = 31;
    var start = firstDay===0?6:firstDay-1;
    var cells = "";
    for(var si=0;si<start;si++) cells+="<div class=\"cal-day other\"></div>";
    for(var di=1;di<=daysInMonth;di++) {
      var ds = di<10?"0"+di:""+di;
      var dp = byDate[ds]||[];
      cells += "<div class=\"cal-day " + (di===5?"today":"") + "\">";
      cells += "<div class=\"cal-num\">" + di + "</div>";
      for(var ei=0;ei<Math.min(2,dp.length);ei++) {
        var chs = dp[ei].canali.map(function(c){return c==="Instagram"?"IG":c==="Facebook"?"FB":"LI";}).join("+");
        cells += "<div class=\"cal-ev " + (dp[ei].stato==="Pubblicato"?"pub":"") + "\">" + chs + "</div>";
      }
      if(dp.length>2) cells += "<div style=\"font-size:8px;color:#7A9999;padding:1px 3px\">+" + (dp.length-2) + "</div>";
      cells += "</div>";
    }
    m += "<div class=\"cal-wrap\"><div class=\"cal-month\">Maggio 2026</div><div class=\"cal-grid\">";
    var dn = ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
    for(var dni=0;dni<7;dni++) m += "<div class=\"cal-dn\">" + dn[dni] + "</div>";
    m += cells + "</div></div>";
  }

  var icons = {
    dashboard: "<svg viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"/><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"/><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"/><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"/></svg>",
    lista: "<svg viewBox=\"0 0 24 24\"><line x1=\"8\" y1=\"6\" x2=\"21\" y2=\"6\"/><line x1=\"8\" y1=\"12\" x2=\"21\" y2=\"12\"/><line x1=\"8\" y1=\"18\" x2=\"21\" y2=\"18\"/><circle cx=\"3\" cy=\"6\" r=\"1.5\" fill=\"currentColor\" stroke=\"none\"/><circle cx=\"3\" cy=\"12\" r=\"1.5\" fill=\"currentColor\" stroke=\"none\"/><circle cx=\"3\" cy=\"18\" r=\"1.5\" fill=\"currentColor\" stroke=\"none\"/></svg>",
    calendario: "<svg viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"/><line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"/><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\"/><line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"/></svg>",
    logout: "<svg viewBox=\"0 0 24 24\"><path d=\"M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1\"/></svg>"
  };

  var firstName = u.nome ? u.nome.split(" ")[0] : "utente";
  var h = "";
  h += "<div class=\"app-screen\">";
  h += "<div class=\"app-header\">";
  h += "<div class=\"app-greeting\">Buongiorno,<br>" + firstName + "</div>";
  h += "<div class=\"app-logo\">" + LOGO_IMG + "</div>";
  h += "</div>";
  h += "<div class=\"app-content\">" + m + "</div>";
  h += "<div class=\"bottom-nav\">";
  var views = ["dashboard","lista","calendario","logout"];
  var labels = {dashboard:"Home",lista:"Lista",calendario:"Cal.",logout:"Esci"};
  for(var vi=0;vi<views.length;vi++) {
    var vid = views[vi];
    var vact = S.view===vid ? "active" : "";
    var vonclick = vid==="logout" ? "doLogout()" : "setView('" + vid + "')";
    h += "<div class=\"bnav-item " + vact + "\" onclick=\"" + vonclick + "\">";
    h += "<div class=\"bnav-icon\">" + icons[vid] + "</div>";
    h += "<div class=\"bnav-label\">" + labels[vid] + "</div></div>";
  }
  h += "</div></div>";
  document.getElementById("root").innerHTML = h;
}

function render() {
  if(!S.loggedIn) { renderLogin(); return; }
  renderApp();
}

render();

</script>
</body>
</html>
